<tr id="frigo-{{ s.id }}">
    <!-- RUTA -->
    <td>
        <select class="form-control" name="valor" hx-post="{{ url_for('frigos.update_row') }}" hx-trigger="change"
            hx-target="#frigo-{{ s.id }}" hx-swap="outerHTML">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="servicio_id" value="{{ s.id }}">
            <input type="hidden" name="campo" value="ruta_frigo_id">
            <option value="">-- Ruta --</option>
            {% for r in rutas %}
            <option value="{{ r.id }}" {% if s.ruta_frigo_id==r.id %}selected{% endif %}>
                {{ r.codigo_ruta }} ({{ r.poblacion }})
            </option>
            {% endfor %}
        </select>
    </td>

    <!-- VEHICULO -->
    <td>
        <select class="form-control" name="valor" hx-post="{{ url_for('frigos.update_row') }}" hx-trigger="change"
            hx-target="#frigo-{{ s.id }}" hx-swap="outerHTML">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="servicio_id" value="{{ s.id }}">
            <input type="hidden" name="campo" value="vehiculo_id">
            <option value="">-- Camión --</option>
            {% for v in vehiculos %}
            <option value="{{ v.id }}" {% if s.vehiculo_id==v.id %}selected{% endif %}>
                {{ v.codigo_interno }}
            </option>
            {% endfor %}
        </select>
    </td>

    <!-- CONDUCTOR -->
    <td>
        <select class="form-control" name="valor" hx-post="{{ url_for('frigos.update_row') }}" hx-trigger="change"
            hx-target="#frigo-{{ s.id }}" hx-swap="outerHTML">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="servicio_id" value="{{ s.id }}">
            <input type="hidden" name="campo" value="conductor_id">
            <option value="">-- Chofer --</option>
            {% for c in conductores %}
            <option value="{{ c.id }}" {% if s.conductor_id==c.id %}selected{% endif %}>
                {{ c.alias }}
            </option>
            {% endfor %}
        </select>
    </td>

    <!-- SALIDA SUECA -->
    <td>
        <input type="text" name="valor" class="form-control" value="{{ s.hora_salida_sueca or '' }}"
            hx-post="{{ url_for('frigos.update_row') }}" hx-trigger="blur" hx-target="#frigo-{{ s.id }}"
            hx-swap="outerHTML">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="servicio_id" value="{{ s.id }}">
        <input type="hidden" name="campo" value="hora_salida_sueca">
    </td>

    <!-- OBSERVACIONES -->
    <td>
        <input type="text" name="valor" class="form-control" value="{{ s.observaciones or '' }}"
            hx-post="{{ url_for('frigos.update_row') }}" hx-trigger="blur" hx-target="#frigo-{{ s.id }}"
            hx-swap="outerHTML">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="servicio_id" value="{{ s.id }}">
        <input type="hidden" name="campo" value="observaciones">
    </td>
</tr>
