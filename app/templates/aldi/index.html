{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: centre; margin-bottom: 20px;">
    <h1 style="color: #0F766E;">Distribución ALDI (Sagunto)</h1>
</div>

<div class="card" style="padding: 0; overflow: hidden;">
    <table class="valin-table">
        <thead>
            <tr>
                <th>Fecha Operativa</th>
                <th>Día</th>
                <th>Viajes Aldi</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in planificaciones %}
            <tr>
                <td style="font-weight: bold;">{{ p.fecha_operativa }}</td>
                <td>{{ p.dia_semana }}</td>
                <td>{{ p.aldis|length }}</td>
                <td>
                    <a href="{{ url_for('aldi.view_planificacion', id=p.id) }}" class="btn-primary"
                        style="padding: 5px 12px; font-size: 12px; background-color: #0F766E;">Planificar Aldi</a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; padding: 40px; color: var(--color-text-muted);">No hay
                    planificaciones abiertas.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
