{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: centre; margin-bottom: 20px;">
    <h1 style="color: var(--color-accent);">Control de RRHH y Nóminas</h1>
</div>

<div class="card" style="padding: 0; overflow: hidden;">
    <table class="valin-table">
        <thead>
            <tr>
                <th>Fecha Operativa</th>
                <th>Día</th>
                <th>Estado Plan</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in planificaciones %}
            <tr>
                <td style="font-weight: bold;">{{ p.fecha_operativa }}</td>
                <td>{{ p.dia_semana }}</td>
                <td>{{ p.estado|upper }}</td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <form action="{{ url_for('rrhh.generar_jornadas', plan_id=p.id) }}" method="post">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="btn-primary"
                                style="background-color: var(--color-accent);">Consolidar Nómina</button>
                        </form>
                        <a href="{{ url_for('rrhh.view_horario', plan_id=p.id) }}" class="btn-primary"
                            style="background-color: #64748B;">Ver Horario</a>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; padding: 40px; color: var(--color-text-muted);">No hay días
                    para procesar.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
